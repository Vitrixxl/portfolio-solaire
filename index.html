<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vitrice Cascales — Développeur Full-Stack &amp; Data</title>
  <meta name="description" content="Portfolio de Vitrice Cascales, développeur full-stack et data science spécialisé en TypeScript, Python et Go." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="hud">
    <header class="hud-top">
      <button class="travel-toggle" id="travel-toggle" type="button" aria-pressed="false">
        <span class="travel-toggle-icon" aria-hidden="true">◇</span>
        <span id="travel-toggle-label">MODE VOYAGE</span>
      </button>
      <div class="hud-status" id="hud-status">EN ORBITE</div>
    </header>

    <div class="hud-cards" id="hud-cards"></div>

    <section class="travel-hud" id="travel-hud" aria-hidden="true" aria-label="Commandes du mode voyage">
      <div class="travel-hud-heading">
        <span class="travel-hud-signal"></span>
        <span>MODE VOYAGE</span>
        <strong id="travel-phase">APPROCHE DU VAISSEAU</strong>
      </div>
      <div class="travel-controls">
        <div class="travel-command"><span><kbd>Z</kbd><i>/</i><kbd>↑</kbd></span><em>DESCENDRE</em></div>
        <div class="travel-command"><span><kbd>S</kbd><i>/</i><kbd>↓</kbd></span><em>MONTER</em></div>
        <div class="travel-command"><span><kbd>Q</kbd><i>/</i><kbd>←</kbd></span><em>GAUCHE</em></div>
        <div class="travel-command"><span><kbd>D</kbd><i>/</i><kbd>→</kbd></span><em>DROITE</em></div>
        <div class="travel-command travel-command--orbit"><span><kbd>O</kbd></span><em>ORBITE</em></div>
      </div>
      <div class="travel-thrust"><span></span>PROPULSION AVANT AUTOMATIQUE</div>
      <button class="travel-exit" id="travel-exit" type="button">QUITTER <kbd>ÉCHAP</kbd></button>
    </section>

    <section class="mobile-flight-controls" id="mobile-flight-controls" aria-hidden="true" aria-label="Pilotage tactile du vaisseau">
      <div class="mobile-joystick-wrap">
        <div class="flight-joystick" id="flight-joystick" role="group" aria-label="Joystick de direction">
          <span class="flight-joystick-cross" aria-hidden="true"></span>
          <span class="flight-joystick-direction flight-joystick-direction--top" aria-hidden="true">↓</span>
          <span class="flight-joystick-direction flight-joystick-direction--right" aria-hidden="true">→</span>
          <span class="flight-joystick-direction flight-joystick-direction--bottom" aria-hidden="true">↑</span>
          <span class="flight-joystick-direction flight-joystick-direction--left" aria-hidden="true">←</span>
          <span class="flight-joystick-knob" id="flight-joystick-knob" aria-hidden="true"></span>
        </div>
        <span class="mobile-control-caption">PILOTAGE</span>
      </div>
      <button class="mobile-orbit" id="mobile-orbit" type="button" disabled>
        <strong>O</strong>
        <span id="mobile-orbit-label">VISEZ UNE PLANÈTE</span>
      </button>
    </section>

    <div class="hud-hint" id="hud-hint">
      <span class="hint-desktop">
        <span class="hint-mouse"><span class="hint-wheel"></span></span>
        <span>MOLETTE : ZOOM CONTINU&nbsp;&nbsp;·&nbsp;&nbsp;CLIC SUR UN ASTRE : VOYAGE</span>
      </span>
      <span class="hint-mobile">GLISSER : ESCALE&nbsp;&nbsp;·&nbsp;&nbsp;PINCER : ZOOM CONTINU&nbsp;&nbsp;·&nbsp;&nbsp;TOUCHER UN ASTRE : VOYAGE</span>
    </div>

    <div class="speed-control" id="hud-speed">
      <label for="speed-range">VITESSE DE ROTATION</label>
      <input type="range" id="speed-range" min="1" max="10" step="1" value="1" aria-label="Vitesse de rotation, de 1 à 10" />
      <output id="speed-output" for="speed-range">×1</output>
    </div>

    <div class="cursor-label" id="cursor-label"></div>
  </div>

  <nav class="hud-nav" id="hud-nav" aria-label="Navigation planètes"></nav>

  <div class="vignette"></div>
  <div class="grain"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
